<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    #container {
      position: relative;
      height: 95vh;
      /* match image aspect ratio 2139:3172 */
      aspect-ratio: 2139 / 3172;
      max-width: 95vw;
    }
    #container img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
    #container canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="container">
    <img src="background_web.jpg" alt="Art">
    <canvas id="eyes"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('eyes');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('container');

    // Internal drawing resolution (matches image)
    canvas.width = 2139;
    canvas.height = 3172;

    // Eye config in image coordinates (2x size)
    const eyeR = 130;
    const pupilR = 58;
    const maxMove = 28;
    const leftEye  = { x: 880, y: 1656 };
    const rightEye = { x: 1208, y: 1591 };

    let mouseX = 0, mouseY = 0;

    document.addEventListener('mousemove', (e) => {
      // Convert screen coords to canvas internal coords
      const rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) / rect.width * canvas.width;
      mouseY = (e.clientY - rect.top) / rect.height * canvas.height;
      draw();
    });

    function drawEye(cx, cy) {
      // White
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, eyeR);
      grad.addColorStop(0.55, '#ffffff');
      grad.addColorStop(1, '#e8e0d8');
      ctx.beginPath();
      ctx.arc(cx, cy, eyeR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Pupil offset
      const dx = mouseX - cx;
      const dy = mouseY - cy;
      const angle = Math.atan2(dy, dx);
      const dist = Math.min(Math.sqrt(dx*dx + dy*dy) * 0.05, maxMove);
      const px = cx + Math.cos(angle) * dist;
      const py = cy + Math.sin(angle) * dist;

      const pgrad = ctx.createRadialGradient(px - pupilR*0.3, py - pupilR*0.3, 0, px, py, pupilR);
      pgrad.addColorStop(0, '#3a2a1a');
      pgrad.addColorStop(1, '#0a0500');
      ctx.beginPath();
      ctx.arc(px, py, pupilR, 0, Math.PI * 2);
      ctx.fillStyle = pgrad;
      ctx.fill();

      // Highlight
      ctx.beginPath();
      ctx.arc(px - 16, py - 16, 16, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawEye(leftEye.x, leftEye.y);
      drawEye(rightEye.x, rightEye.y);
    }

    draw();
  </script>
</body>
</html>
